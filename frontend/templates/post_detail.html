{% extends "base.html" %}
{% load static %}

{% block title %}Post — BlogSpace{% endblock %}

{% block extra_head %}
<style>
    .prose-body p  { margin-bottom: 1rem; line-height: 1.8; }
    .prose-body h2 { font-size: 1.35rem; font-weight: 700; margin: 1.5rem 0 0.5rem; }
    .prose-body h3 { font-size: 1.15rem; font-weight: 600; margin: 1.2rem 0 0.4rem; }
    .prose-body ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose-body ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose-body pre { background: #f1f5f9; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; font-size: 0.85rem; margin-bottom: 1rem; }
    .prose-body code { background: #f1f5f9; border-radius: 0.25rem; padding: 0.1rem 0.35rem; font-size: 0.85rem; }
    .reply-indent { border-left: 3px solid #e0e7ff; padding-left: 1rem; margin-top: 0.75rem; }
</style>
{% endblock %}

{% block content %}
<!-- Inject post ID for JS -->
<script>const POST_ID = {{ post_id }};</script>

<!-- ── Loading Skeleton ── -->
<div id="post-loading" class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
    <div class="animate-pulse space-y-4">
        <div class="h-3 bg-slate-200 rounded-full w-24"></div>
        <div class="h-8 bg-slate-200 rounded-full w-3/4"></div>
        <div class="h-4 bg-slate-100 rounded-full w-1/3"></div>
        <div class="space-y-2 mt-6">
            <div class="h-3 bg-slate-100 rounded-full w-full"></div>
            <div class="h-3 bg-slate-100 rounded-full w-5/6"></div>
            <div class="h-3 bg-slate-100 rounded-full w-full"></div>
            <div class="h-3 bg-slate-100 rounded-full w-4/5"></div>
            <div class="h-3 bg-slate-100 rounded-full w-full"></div>
        </div>
    </div>
</div>

<!-- ── Post Content ── -->
<div id="post-content" class="hidden max-w-3xl mx-auto px-4 sm:px-6 py-10">

    <!-- Back + Actions bar -->
    <div class="flex items-center justify-between mb-8">
        <a href="/dashboard/" class="flex items-center gap-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Dashboard
        </a>
        <!-- Author-only actions -->
        <div id="post-owner-actions" class="hidden flex gap-2">
            <button onclick="openPostEditModal()"
                class="text-sm text-slate-600 border border-slate-200 hover:bg-slate-50 px-3 py-1.5 rounded-lg transition-colors">
                Edit
            </button>
            <button onclick="deleteCurrentPost()"
                class="text-sm text-red-500 border border-red-100 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                Delete
            </button>
        </div>
    </div>

    <!-- Tags -->
    <div id="post-tags" class="flex flex-wrap gap-2 mb-4"></div>

    <!-- Title -->
    <h1 id="post-title" class="text-3xl sm:text-4xl font-extrabold text-slate-900 leading-tight mb-4"></h1>

    <!-- Meta -->
    <div class="flex items-center gap-4 text-sm text-slate-400 mb-8 pb-8 border-b border-slate-100">
        <span id="post-author" class="flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
        </span>
        <span id="post-date" class="flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
        </span>
        <span id="post-status-badge" class="px-2.5 py-0.5 rounded-full text-xs font-semibold"></span>
    </div>

    <!-- Body -->
    <div id="post-body" class="prose-body text-slate-700 text-base leading-relaxed mb-14"></div>

    <!-- ── Comments ── -->
    <div class="border-t border-slate-100 pt-10">
        <h2 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            Comments <span id="comment-count" class="text-slate-400 font-normal text-base"></span>
        </h2>

        <!-- Comment form (shown when logged in) -->
        <div id="comment-form-wrap" class="hidden mb-8">
            <form id="comment-form" class="space-y-3">
                <textarea id="comment-body" rows="3" placeholder="Write a comment..."
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors resize-none"></textarea>
                <button type="submit"
                    class="btn-primary px-5 py-2.5 rounded-xl text-white text-sm font-semibold">
                    Post Comment
                </button>
            </form>
        </div>

        <!-- Login nudge (shown when not logged in) -->
        <div id="comment-login-nudge" class="hidden mb-8 p-4 bg-indigo-50 border border-indigo-100 rounded-xl text-sm text-indigo-700">
            <a href="/login/" class="font-semibold hover:underline">Sign in</a> to join the conversation.
        </div>

        <!-- Comments list -->
        <div id="comments-container" class="space-y-6"></div>

        <!-- No comments state -->
        <div id="comments-empty" class="hidden text-center py-10 text-slate-400">
            <svg class="w-10 h-10 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            <p class="text-sm">No comments yet. Be the first!</p>
        </div>
    </div>
</div>

<!-- ── Edit Post Modal (owner only) ── -->
<div id="post-edit-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-slate-900">Edit Post</h2>
            <button onclick="closePostEditModal()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <form id="post-edit-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Title</label>
                <input id="edit-title" type="text" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors" required />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Content</label>
                <textarea id="edit-body" rows="6" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors resize-none"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
                <select id="edit-status" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Tags <span class="text-slate-400 font-normal">(comma separated)</span></label>
                <input id="edit-tags" type="text" placeholder="django, python" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors" />
            </div>
            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm">
                Save Changes
            </button>
        </form>
    </div>
</div>

<!-- ── Edit Comment Modal ── -->
<div id="comment-edit-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-7">
        <div class="flex items-center justify-between mb-5">
            <h2 class="text-lg font-bold text-slate-900">Edit Comment</h2>
            <button onclick="closeCommentEditModal()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <form id="comment-edit-form" class="space-y-4">
            <input type="hidden" id="edit-comment-id" />
            <textarea id="edit-comment-body" rows="4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors resize-none"></textarea>
            <button type="submit" class="btn-primary w-full py-2.5 rounded-xl text-white font-semibold text-sm">Save</button>
        </form>
    </div>
</div>

<script src="{% static 'js/post.js' %}"></script>
{% endblock %}
