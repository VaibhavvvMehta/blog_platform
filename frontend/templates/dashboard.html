{% extends "base.html" %}
{% load static %}

{% block title %}Blogs — BlogSpace{% endblock %}

{% block content %}

<!-- Page Header -->
<div class="bg-white border-b border-slate-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Blogs</h1>
            <p class="text-slate-400 text-sm mt-0.5" id="page-subtitle">Discover published posts</p>
        </div>
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <!-- Write New Blog: only revealed for logged-in users via JS -->
            <button id="write-blog-btn" onclick="openNewPostModal()"
                class="hidden items-center gap-2 btn-primary text-white px-4 py-2.5 rounded-xl text-sm font-semibold shadow-md shadow-indigo-100 whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
                Write New Blog
            </button>
            <!-- Search bar -->
            <div class="relative w-full sm:w-64">
                <svg class="absolute left-3 top-3 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
                </svg>
                <input id="search-input" type="text" placeholder="Search posts..."
                    class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors" />
            </div>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto px-4 sm:px-6 py-10">

    <!-- Filter Tabs -->
    <div class="flex items-center gap-2 mb-6">
        <button onclick="filterPosts('all')" id="tab-all"
            class="px-4 py-1.5 rounded-full text-sm font-medium bg-indigo-600 text-white transition-all">All</button>
        <button onclick="filterPosts('published')" id="tab-published"
            class="px-4 py-1.5 rounded-full text-sm font-medium text-slate-500 hover:bg-slate-100 transition-all">Published</button>
        <!-- Drafts tab: only shown to logged-in users via JS -->
        <button onclick="filterPosts('draft')" id="tab-draft"
            class="hidden px-4 py-1.5 rounded-full text-sm font-medium text-slate-500 hover:bg-slate-100 transition-all">My Drafts</button>
    </div>

    <!-- Loading Skeleton -->
    <div id="posts-skeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for i in "123456" %}
        <div class="bg-white rounded-2xl border border-slate-100 p-6 animate-pulse">
            <div class="h-4 bg-slate-100 rounded-full w-1/3 mb-4"></div>
            <div class="h-5 bg-slate-200 rounded-full w-3/4 mb-2"></div>
            <div class="h-3 bg-slate-100 rounded-full w-full mb-1"></div>
            <div class="h-3 bg-slate-100 rounded-full w-5/6 mb-6"></div>
            <div class="h-8 bg-slate-100 rounded-full w-1/4"></div>
        </div>
        {% endfor %}
    </div>

    <!-- Posts Grid -->
    <div id="posts-container" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Empty State -->
    <div id="posts-empty" class="hidden text-center py-20">
        <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-slate-700 mb-1">No posts yet</h3>
        <p class="text-slate-400 text-sm">Be the first to publish something amazing.</p>
    </div>
</div>

<!-- New Post Modal -->
<div id="new-post-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-slate-900">New Post</h2>
            <button onclick="closeNewPostModal()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form id="new-post-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Title</label>
                <input id="post-title" type="text" placeholder="Your post title..."
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors" required />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Slug</label>
                <input id="post-slug" type="text" placeholder="my-post-title"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors" required />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Content</label>
                <textarea id="post-body" rows="5" placeholder="Write your post content here..."
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors resize-none"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
                <select id="post-status"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Tags <span class="text-slate-400 font-normal">(comma separated)</span></label>
                <input id="post-tags" type="text" placeholder="django, python, tutorial"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors" />
            </div>
            <button type="submit"
                class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm">
                Publish Post
            </button>
        </form>
    </div>
</div>

<!-- Close modal on backdrop click -->

<!-- Edit Post Modal -->
<div id="edit-post-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-slate-900">Edit Post</h2>
            <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <form id="edit-post-form" class="space-y-4">
            <input type="hidden" id="edit-post-id" />
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Title</label>
                <input id="edit-post-title" type="text" placeholder="Your post title..."
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors" required />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Content</label>
                <textarea id="edit-post-body" rows="5" placeholder="Write your post content here..."
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors resize-none"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
                <select id="edit-post-status"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Tags <span class="text-slate-400 font-normal">(comma separated)</span></label>
                <input id="edit-post-tags" type="text" placeholder="django, python, tutorial"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:border-indigo-400 transition-colors" />
            </div>
            <button type="submit"
                class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm">
                Save Changes
            </button>
        </form>
    </div>
</div>

<script src="{% static 'js/dashboard.js' %}"></script>
{% endblock %}
