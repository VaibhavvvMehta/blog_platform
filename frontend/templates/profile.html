{% extends "base.html" %}
{% load static %}

{% block title %}My Profile — BlogSpace{% endblock %}

{% block content %}
<script>
    if (!localStorage.getItem('token')) window.location.href = '/login/';
</script>

<div class="max-w-2xl mx-auto px-4 sm:px-6 py-12">

    <!-- Page header -->
    <div class="mb-10">
        <h1 class="text-2xl font-bold text-slate-900">My Profile</h1>
        <p class="text-slate-400 text-sm mt-1">View and update your account information</p>
    </div>

    <!-- Loading skeleton -->
    <div id="profile-loading" class="animate-pulse space-y-5">
        <div class="flex items-center gap-4">
            <div class="w-20 h-20 rounded-full bg-slate-200"></div>
            <div class="space-y-2">
                <div class="h-4 bg-slate-200 rounded-full w-32"></div>
                <div class="h-3 bg-slate-100 rounded-full w-48"></div>
            </div>
        </div>
        <div class="h-10 bg-slate-100 rounded-xl w-full"></div>
        <div class="h-10 bg-slate-100 rounded-xl w-full"></div>
        <div class="h-16 bg-slate-100 rounded-xl w-full"></div>
    </div>

    <!-- Profile card -->
    <div id="profile-card" class="hidden">

        <!-- Avatar + identity -->
        <div class="flex items-center gap-5 mb-8 p-6 bg-white border border-slate-100 rounded-2xl shadow-sm">
            <div id="avatar-display" class="w-20 h-20 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white text-2xl font-bold flex-shrink-0 overflow-hidden">
                <!-- filled by JS -->
            </div>
            <div>
                <p id="display-username" class="text-xl font-bold text-slate-900"></p>
                <p id="display-email" class="text-sm text-slate-400"></p>
                <p id="display-bio" class="text-sm text-slate-500 mt-1 italic"></p>
            </div>
        </div>

        <!-- Edit Form -->
        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-6 sm:p-8">
            <h2 class="text-base font-semibold text-slate-800 mb-5">Edit Information</h2>
            <form id="profile-form" class="space-y-5">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                        <input id="field-username" type="text"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:bg-white focus:border-indigo-400 transition-colors" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
                        <input id="field-email" type="email"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:bg-white focus:border-indigo-400 transition-colors" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Bio</label>
                    <textarea id="field-bio" rows="3" placeholder="Tell the world about yourself..."
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">New Password <span class="text-slate-400 font-normal">(leave blank to keep current)</span></label>
                    <div class="relative">
                        <input id="field-password" type="password" placeholder="••••••••"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors pr-11" />
                        <button type="button" onclick="togglePwd('field-password')" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error -->
                <div id="profile-error" class="hidden p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700"></div>

                <div class="flex gap-3 pt-2">
                    <button type="submit" id="save-btn"
                        class="btn-primary flex-1 py-3 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">
                        <span id="save-btn-text">Save Changes</span>
                        <svg id="save-spinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Danger zone -->
        <div class="mt-8 p-5 border border-red-100 rounded-2xl bg-red-50">
            <h3 class="text-sm font-semibold text-red-700 mb-1">Danger Zone</h3>
            <p class="text-xs text-red-500 mb-3">Logging out will clear your session from this device.</p>
            <button onclick="logout()" class="text-sm text-red-600 border border-red-200 bg-white hover:bg-red-50 px-4 py-2 rounded-lg transition-colors font-medium">
                Sign Out
            </button>
        </div>
    </div>
</div>

<script>
function togglePwd(id) {
    const input = document.getElementById(id);
    if (input) input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
<script src="{% static 'js/profile.js' %}"></script>
{% endblock %}
