{% extends "base.html" %}
{% load static %}

{% block title %}Sign In — BlogSpace{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-16 bg-gradient-to-br from-indigo-50 via-white to-purple-50">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-100 border border-slate-100 p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl mx-auto mb-4">B</div>
                <h1 class="text-2xl font-bold text-slate-900">Welcome back</h1>
                <p class="text-slate-400 text-sm mt-1">Sign in to your BlogSpace account</p>
            </div>

            <!-- Error Message -->
            <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700 flex items-center gap-2">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                <span id="login-error-text">Invalid credentials. Please try again.</span>
            </div>

            <!-- Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
                    <input
                        type="email" id="email" name="email"
                        placeholder="you@example.com"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors"
                        required
                    />
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="password" class="text-sm font-medium text-slate-700">Password</label>
                        <a href="#" class="text-xs text-indigo-600 hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input
                            type="password" id="password" name="password"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors pr-11"
                            required
                        />
                        <button type="button" onclick="togglePassword('password', this)" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="login-btn"
                    class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm shadow-md shadow-indigo-100 flex items-center justify-center gap-2">
                    <span id="login-btn-text">Sign In</span>
                    <svg id="login-spinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                    </svg>
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6 gap-3">
                <div class="flex-1 h-px bg-slate-100"></div>
                <span class="text-xs text-slate-400">or</span>
                <div class="flex-1 h-px bg-slate-100"></div>
            </div>

            <p class="text-center text-sm text-slate-500">
                Don't have an account?
                <a href="/register/" class="text-indigo-600 font-semibold hover:underline ml-1">Create one free</a>
            </p>
        </div>

    </div>
</div>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
<script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
