{% extends "base.html" %}
{% load static %}

{% block title %}Create Account — BlogSpace{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-16 bg-gradient-to-br from-indigo-50 via-white to-purple-50">
    <div class="w-full max-w-md">

        <div class="bg-white rounded-2xl shadow-xl shadow-slate-100 border border-slate-100 p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl mx-auto mb-4">B</div>
                <h1 class="text-2xl font-bold text-slate-900">Create your account</h1>
                <p class="text-slate-400 text-sm mt-1">Join BlogSpace and start writing today</p>
            </div>

            <!-- Error & Success -->
            <div id="reg-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700 flex items-start gap-2">
                <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                <span id="reg-error-text"></span>
            </div>

            <!-- Form -->
            <form id="register-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                        <input type="text" id="username" name="username" placeholder="johndoe"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors"
                            required />
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors"
                            required />
                    </div>
                </div>

                <div>
                    <label for="bio" class="block text-sm font-medium text-slate-700 mb-1.5">Bio <span class="text-slate-400 font-normal">(optional)</span></label>
                    <textarea id="bio" name="bio" rows="2" placeholder="Tell the world about yourself..."
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors resize-none"></textarea>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" placeholder="Min. 8 characters"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors pr-11"
                            required />
                        <button type="button" onclick="togglePwd('password')" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Password strength bar -->
                    <div id="strength-bar-wrap" class="mt-2 hidden">
                        <div class="h-1.5 rounded-full bg-slate-100 overflow-hidden">
                            <div id="strength-bar" class="h-full rounded-full transition-all duration-300 w-0"></div>
                        </div>
                        <p id="strength-label" class="text-xs mt-1 text-slate-400"></p>
                    </div>
                </div>

                <div>
                    <label for="password2" class="block text-sm font-medium text-slate-700 mb-1.5">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="password2" name="password2" placeholder="Repeat password"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:bg-white focus:border-indigo-400 transition-colors pr-11"
                            required />
                        <button type="button" onclick="togglePwd('password2')" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="reg-btn"
                    class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm shadow-md shadow-indigo-100 flex items-center justify-center gap-2 mt-2">
                    <span id="reg-btn-text">Create Account</span>
                    <svg id="reg-spinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                    </svg>
                </button>
            </form>

            <div class="flex items-center my-6 gap-3">
                <div class="flex-1 h-px bg-slate-100"></div>
                <span class="text-xs text-slate-400">or</span>
                <div class="flex-1 h-px bg-slate-100"></div>
            </div>

            <p class="text-center text-sm text-slate-500">
                Already have an account?
                <a href="/login/" class="text-indigo-600 font-semibold hover:underline ml-1">Sign in</a>
            </p>
        </div>

    </div>
</div>

<script>
function togglePwd(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}

// Password strength checker
const pwdInput = document.getElementById('password');
const strengthBar = document.getElementById('strength-bar');
const strengthLabel = document.getElementById('strength-label');
const strengthWrap = document.getElementById('strength-bar-wrap');

pwdInput.addEventListener('input', function() {
    const val = this.value;
    if (!val) { strengthWrap.classList.add('hidden'); return; }
    strengthWrap.classList.remove('hidden');
    let score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const configs = [
        { w: '25%', color: 'bg-red-400', label: 'Weak' },
        { w: '50%', color: 'bg-orange-400', label: 'Fair' },
        { w: '75%', color: 'bg-yellow-400', label: 'Good' },
        { w: '100%', color: 'bg-emerald-500', label: 'Strong' },
    ];
    const cfg = configs[score - 1] || configs[0];
    strengthBar.className = `h-full rounded-full transition-all duration-300 ${cfg.color}`;
    strengthBar.style.width = cfg.w;
    strengthLabel.textContent = cfg.label;
    strengthLabel.className = `text-xs mt-1 ${
        score <= 1 ? 'text-red-500' : score === 2 ? 'text-orange-500' : score === 3 ? 'text-yellow-600' : 'text-emerald-600'
    }`;
});

// Form submit
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    const errorBox = document.getElementById('reg-error');
    const errorText = document.getElementById('reg-error-text');

    if (password !== password2) {
        errorBox.classList.remove('hidden');
        errorText.textContent = 'Passwords do not match.';
        return;
    }

    const btn = document.getElementById('reg-btn');
    const btnText = document.getElementById('reg-btn-text');
    const spinner = document.getElementById('reg-spinner');
    btn.disabled = true;
    btnText.textContent = 'Creating account...';
    spinner.classList.remove('hidden');
    errorBox.classList.add('hidden');

    fetch('/api/users/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: password,
            bio: document.getElementById('bio').value.trim(),
        })
    })
    .then(res => {
        if (!res.ok) return res.json().then(d => Promise.reject(d));
        return res.json();
    })
    .then(() => {
        showToast('Account created! Sign in to continue.', 'success');
        setTimeout(() => window.location.href = '/login/', 1500);
    })
    .catch(err => {
        errorBox.classList.remove('hidden');
        const firstErr = Object.values(err)[0];
        errorText.textContent = Array.isArray(firstErr) ? firstErr[0] : JSON.stringify(err);
        btn.disabled = false;
        btnText.textContent = 'Create Account';
        spinner.classList.add('hidden');
    });
});
</script>
{% endblock %}
