{% extends "base.html" %}
{% load static %}

{% block title %}BlogSpace — Discover Stories{% endblock %}

{% block content %}
<!-- Compact Hero -->
<section class="relative overflow-hidden bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-14 px-4 text-center">
    <div class="absolute top-0 left-0 w-72 h-72 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-72 h-72 bg-purple-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 translate-x-1/2 translate-y-1/2"></div>
    <div class="relative max-w-2xl mx-auto">
        <h1 class="text-4xl sm:text-5xl font-extrabold text-slate-900 leading-tight mb-4">
            Discover <span class="gradient-text">Stories</span>
        </h1>
        <p class="text-slate-500 text-base mb-7">Read the latest posts from the BlogSpace community — no account needed.</p>
        <!-- Search -->
        <div class="relative max-w-md mx-auto">
            <svg class="absolute left-4 top-3.5 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
            </svg>
            <input id="home-search" type="text" placeholder="Search posts..."
                class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 shadow-sm focus:border-indigo-400 transition-colors" />
        </div>
    </div>
</section>

<!-- Posts Feed -->
<div class="max-w-6xl mx-auto px-4 sm:px-6 py-10">

    <!-- Loading Skeleton -->
    <div id="home-skeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for i in "123456" %}
        <div class="bg-white rounded-2xl border border-slate-100 p-6 animate-pulse">
            <div class="h-4 bg-slate-100 rounded-full w-1/3 mb-4"></div>
            <div class="h-5 bg-slate-200 rounded-full w-3/4 mb-2"></div>
            <div class="h-3 bg-slate-100 rounded-full w-full mb-1"></div>
            <div class="h-3 bg-slate-100 rounded-full w-5/6 mb-6"></div>
            <div class="h-8 bg-slate-100 rounded-full w-1/4"></div>
        </div>
        {% endfor %}
    </div>

    <!-- Posts Grid -->
    <div id="home-posts" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Empty State -->
    <div id="home-empty" class="hidden text-center py-20">
        <p class="text-slate-500 text-base font-medium">No posts found.</p>
    </div>

    <!-- Load more -->
    <div id="load-more-wrap" class="hidden text-center mt-10">
        <button id="load-more-btn" onclick="loadMorePosts()"
            class="border border-slate-200 text-slate-600 hover:bg-slate-50 px-6 py-2.5 rounded-xl text-sm font-medium transition-colors">
            Load more
        </button>
    </div>
</div>

<script>
(function() {
    let allPosts = [];
    let visible  = 9;

    function formatDate(d) {
        return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function truncate(s, max = 120) {
        if (!s) return 'No preview available.';
        return s.length > max ? s.substring(0, max) + '…' : s;
    }

    function renderCards(posts) {
        const container = document.getElementById('home-posts');
        const empty     = document.getElementById('home-empty');
        const lmWrap    = document.getElementById('load-more-wrap');
        if (!posts.length) {
            container.classList.add('hidden');
            empty.classList.remove('hidden');
            lmWrap.classList.add('hidden');
            return;
        }
        empty.classList.add('hidden');
        container.innerHTML = posts.map(post => {
            const tags = (post.tags || []).slice(0, 3)
                .map(t => `<span class="bg-indigo-50 text-indigo-600 text-xs px-2 py-0.5 rounded-full">${t.name || t}</span>`)
                .join('');
            return `
            <a href="/posts/${post.id}/" class="bg-white rounded-2xl border border-slate-100 p-6 flex flex-col gap-3 card-hover no-underline">
                <div class="flex items-center justify-between">
                    ${tags ? `<div class="flex flex-wrap gap-1">${tags}</div>` : '<span></span>'}
                    <span class="text-xs text-slate-400 ml-auto pl-2 whitespace-nowrap">${post.created_at ? formatDate(post.created_at) : ''}</span>
                </div>
                <h2 class="text-base font-bold text-slate-900 leading-snug line-clamp-2">${post.title}</h2>
                <p class="text-sm text-slate-500 leading-relaxed flex-1">${truncate(post.body)}</p>
                <div class="flex items-center gap-1.5 text-xs text-slate-400 pt-2 border-t border-slate-50 mt-auto">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    ${post.author || 'Anonymous'}
                </div>
            </a>`;
        }).join('');
        container.classList.remove('hidden');
        container.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6';
        lmWrap.classList.toggle('hidden', posts.length >= allPosts.length || allPosts.length <= visible);
    }

    function applySearch() {
        const q = document.getElementById('home-search').value.toLowerCase();
        const filtered = q
            ? allPosts.filter(p =>
                (p.title || '').toLowerCase().includes(q) ||
                (p.body  || '').toLowerCase().includes(q) ||
                (p.author|| '').toLowerCase().includes(q))
            : allPosts;
        renderCards(filtered.slice(0, visible));
        document.getElementById('load-more-wrap').classList.toggle('hidden', filtered.length <= visible);
    }

    window.loadMorePosts = function() {
        visible += 9;
        applySearch();
    };

    document.getElementById('home-search').addEventListener('input', function() {
        visible = 9;
        applySearch();
    });

    // Fetch only published posts (no token needed)
    fetch('/api/posts/')
        .then(r => r.ok ? r.json() : { results: [] })
        .then(data => {
            allPosts = (Array.isArray(data) ? data : (data.results || []))
                .filter(p => p.status === 'published');
            document.getElementById('home-skeleton').classList.add('hidden');
            renderCards(allPosts.slice(0, visible));
        })
        .catch(() => {
            document.getElementById('home-skeleton').classList.add('hidden');
            document.getElementById('home-empty').classList.remove('hidden');
        });
})();
</script>
{% endblock %}
