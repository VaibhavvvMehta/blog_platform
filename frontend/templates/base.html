{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}BlogSpace{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
        #toast-container { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 500; min-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform:translateX(100%); } to { opacity:1; transform:translateX(0); } }
        .toast-success { background: #ecfdf5; color: #065f46; border-left: 4px solid #10b981; }
        .toast-error   { background: #fef2f2; color: #7f1d1d; border-left: 4px solid #ef4444; }
        .toast-info    { background: #eff6ff; color: #1e3a5f; border-left: 4px solid #3b82f6; }
        input:focus { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Navbar -->
<header class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <!-- Brand -->
        <a href="/" class="flex items-center gap-2 text-xl font-bold">
            <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-sm font-bold">B</span>
            <span class="gradient-text">BlogSpace</span>
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden sm:flex items-center gap-6 text-sm font-medium text-slate-600">
            <a href="/" class="hover:text-indigo-600 transition-colors">Home</a>
            <span id="nav-auth-links">
                <a href="/login/" class="hover:text-indigo-600 transition-colors mr-4">Sign In</a>
                <a href="/register/" class="btn-primary text-white px-4 py-2 rounded-lg text-sm font-semibold">Get Started</a>
            </span>
            <span id="nav-user-links" class="hidden items-center gap-4">
                <a href="/dashboard/" class="hover:text-indigo-600 transition-colors">Dashboard</a>
                <button onclick="logout()" class="flex items-center gap-1 text-slate-500 hover:text-red-500 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
                    Logout
                </button>
            </span>
        </nav>
    </div>
</header>

<!-- Page Content -->
<main class="flex-1">
{% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="bg-white border-t border-slate-100 mt-auto">
    <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between text-sm text-slate-400 gap-2">
        <span>© 2026 <span class="font-semibold text-slate-600">BlogSpace</span>. All rights reserved.</span>
        <div class="flex gap-4">
            <a href="#" class="hover:text-indigo-500 transition-colors">Privacy</a>
            <a href="#" class="hover:text-indigo-500 transition-colors">Terms</a>
        </div>
    </div>
</footer>

<!-- Global auth.js (logout + toast) -->
<script src="{% static 'js/auth.js' %}"></script>
<script>
    // Show/hide nav links based on auth state
    (function() {
        const token = localStorage.getItem('token');
        const authLinks = document.getElementById('nav-auth-links');
        const userLinks = document.getElementById('nav-user-links');
        if (token) {
            authLinks.classList.add('hidden');
            userLinks.classList.remove('hidden');
            userLinks.classList.add('flex');
        }
    })();
</script>
{% block extra_scripts %}{% endblock %}

</body>
</html>
